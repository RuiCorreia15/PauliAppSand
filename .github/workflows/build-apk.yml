name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap
        run: bubblewrap init --manifest=https://pauliapp.netlify.app/manifest.json --directory=./android

      - name: Build APK
        run: |
          cd android
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PauliApp-debug
          path: android/app-release-signed.apk
