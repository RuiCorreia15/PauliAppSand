plugins {
  id 'com.android.application'
}

repositories {
  google()
  mavenCentral()
}

android {
  namespace 'com.pauliapp.app'
  compileSdk 34
  defaultConfig {
    applicationId "com.pauliapp.app"
    minSdk 21
    targetSdk 34
    versionCode 1
    versionName "1.0"
  }
  buildTypes {
    debug {
      debuggable true
    }
  }
}
